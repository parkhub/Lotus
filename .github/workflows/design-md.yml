name: Lint DESIGN.md

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Validate design files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Lint root DESIGN.md
        run: npx --yes @google/design.md lint DESIGN.md

      # Platform files are guidance prose with no YAML front matter.
      # The CLI may warn on content-only files — treat as informational until
      # the alpha spec clarifies how to handle them.
      - name: Lint iOS platform guidance
        run: npx @google/design.md lint platforms/ios/DESIGN.md || true

      - name: Lint Android platform guidance
        run: npx @google/design.md lint platforms/android/DESIGN.md || true

      - name: Lint web platform guidance
        run: npx @google/design.md lint platforms/web/DESIGN.md || true
