name: Lint and build DESIGN.md

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-build:
    name: Validate and export design tokens
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint DESIGN.md
        run: npm run lint

      - name: Export tokens.json
        run: npm run build

      - name: Build platform outputs
        run: npm run build:platforms

      - name: Commit generated files
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add design-tokens/tokens.json dist/
          git diff --cached --quiet || git commit -m "chore: regenerate tokens.json and platform outputs [skip ci]"
          git push
